<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="视频展厅：在浏览器中观看本目录的视频作品。"
    />
    <meta name="theme-color" content="#0a0d12" />
    <title>视频展厅</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="返回首页">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>视频展厅</span>
      </a>
      <a class="header-link" href="#gallery">浏览作品</a>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-glow hero-glow-left" aria-hidden="true"></div>
        <div class="hero-glow hero-glow-right" aria-hidden="true"></div>
        <p class="eyebrow">VIDEO SHOWCASE</p>
        <h1 id="hero-title">把每一个画面，<br />留在此刻。</h1>
        <p class="hero-copy">
          一个专注于内容本身的视频空间。无需登录，点击作品即可开始观看。
        </p>
        <a class="primary-button" href="#gallery">
          开始浏览
          <span aria-hidden="true">↓</span>
        </a>
      </section>

      <section class="gallery-section" id="gallery" aria-labelledby="gallery-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">FEATURED</p>
            <h2 id="gallery-title">精选作品</h2>
          </div>
          <p class="video-count"><span id="video-count">1</span> 部视频</p>
        </div>

        <div class="video-grid" id="video-grid"></div>
      </section>
    </main>

    <footer>
      <p>视频展厅 <span aria-hidden="true">·</span> <span id="year"></span></p>
      <p>让作品自己说话</p>
    </footer>

    <dialog class="player-dialog" id="player-dialog" aria-labelledby="player-title">
      <div class="dialog-shell">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">NOW PLAYING</p>
            <h2 id="player-title"></h2>
          </div>
          <button class="close-button" id="close-player" type="button" aria-label="关闭播放器">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <video id="main-player" controls playsinline preload="metadata"></video>
      </div>
    </dialog>

    <noscript>请启用 JavaScript 以浏览和播放视频。</noscript>
    <script src="./app.js"></script>
  </body>
</html>
